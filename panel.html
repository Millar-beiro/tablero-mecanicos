<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tablero Mantenimiento</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#000;
padding:10px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.topbar{
padding:10px;
text-align:center;
background:#222;
}

button{
padding:8px 14px;
margin:5px;
border-radius:6px;
border:none;
cursor:pointer;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{

background:#222;
padding:10px;
border-radius:8px;
text-align:center;

}

.ok{
background:#1c7a1c;
}

.falla{
background:#9b0000;
}

.mecanico{
font-size:22px;
font-weight:bold;
color:#ffffff;
margin-top:5px;
letter-spacing:1px;
}

.big{
font-size:35px;
font-weight:bold;
}

.hidden{
display:none;
}

.login{

position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:20px;
border-radius:10px;

}

</style>
</head>

<body>

<header>
TABLERO PLANTA
</header>

<div id="top" class="topbar hidden">

<button onclick="showPlanta()">Tablero Planta</button>

<button id="btnModulos" onclick="showModulos()">MODULOS</button>

<button id="excelBtn" onclick="descargarExcel()">Excel</button>

</div>



<div id="loginBox" class="login">

<h2>Ingreso</h2>

Usuario<br>
<input id="user">

<br><br>

Clave<br>
<input id="pass" type="password">

<br><br>

<button onclick="login()">Entrar</button>

</div>



<div id="planta" class="hidden">

<div class="grid" id="grid"></div>

</div>



<div id="modulos" class="hidden">

<h2 style="text-align:center;">MODULOS</h2>

<div id="modulosGrid" class="grid"></div>

</div>



<script>

let usuario="";
let autenticado=false;

let data={};

let socket;


function conectar(){

socket=new WebSocket("ws://localhost:3000");

socket.onmessage=e=>{

data=JSON.parse(e.data);

render();

}

}

conectar();



function login(){

let u=user.value;
let p=pass.value;

if(u=="PROGRAMADOR" && p=="1234"){
usuario="PROGRAMADOR";
autenticado=true;
}

else if(u=="ADMINISTRADOR" && p=="1234"){
usuario="ADMINISTRADOR";
autenticado=true;
}

else if(u=="TELEVISOR" && p=="1234"){
usuario="TELEVISOR";
autenticado=true;
}

if(autenticado){

loginBox.classList.add("hidden");

top.classList.remove("hidden");

planta.classList.remove("hidden");

configurarPermisos();

}

}



function configurarPermisos(){

if(usuario=="PROGRAMADOR"){

excelBtn.style.display="inline";
btnModulos.style.display="inline";

}

if(usuario=="ADMINISTRADOR"){

excelBtn.style.display="inline";
btnModulos.style.display="none";

}

if(usuario=="TELEVISOR"){

excelBtn.style.display="none";
btnModulos.style.display="none";

}

}



function showPlanta(){

planta.classList.remove("hidden");

modulos.classList.add("hidden");

}



function showModulos(){

if(usuario!="PROGRAMADOR")return;

planta.classList.add("hidden");

modulos.classList.remove("hidden");

renderModulos();

}



function render(){

let html="";

for(let m in data){

let d=data[m];

html+=`

<div class="card ${d.estado}">

<div class="big">

${m}

</div>

<div>

${d.estado}

</div>

<div class="mecanico">

${d.mecanico || ""}

</div>

${usuario=="PROGRAMADOR"?`

<button onclick="editarMecanico('${m}')">

Editar Mecánico

</button>

`:""}

</div>

`;

}

grid.innerHTML=html;

}



function renderModulos(){

let html="";

for(let m in data){

html+=`

<div class="card">

<div class="big">${m}</div>

<br>

<button onclick="falla('${m}')">

Falla

</button>

<button onclick="ok('${m}')">

OK

</button>

</div>

`;

}

modulosGrid.innerHTML=html;

}



function falla(m){

let mec=prompt("Mecanico:");

if(!mec)return;

socket.send(JSON.stringify({

tipo:"falla",
modulo:m,
mecanico:mec

}));

}



function ok(m){

socket.send(JSON.stringify({

tipo:"ok",
modulo:m

}));

}



function editarMecanico(m){

let mec=prompt("Nuevo mecanico:");

if(!mec)return;

socket.send(JSON.stringify({

tipo:"editar",
modulo:m,
mecanico:mec

}));

}



function descargarExcel(){

if(usuario!="ADMINISTRADOR" && usuario!="PROGRAMADOR")return;

alert("Excel descargado");

}



</script>

</body>

</html>
